    document.addEventListener("keydown", function(event) {
      tangenter[event.code] = true;

      if (event.code === "Space") {
        event.preventDefault();
        hoppa();
      }
    });

    document.addEventListener("keyup", function(event) {
      tangenter[event.code] = false;
    });

    function hoppa() {
      if (spelare.paMarken) {
        spelare.yHastighet = -spelare.hoppStyrka;
        spelare.paMarken = false;
      }
    }

    function laddaNiva(nummer) {
      aktuellNiva = nummer;

      spelare.x = 50;
      spelare.y = 300;
      spelare.yHastighet = 0;
      spelare.paMarken = false;

      document.getElementById("nivaText").textContent = aktuellNiva + 1;
      document.getElementById("meddelande").textContent = nivaer[aktuellNiva].namn;
    }

    function uppdatera() {
      if (tangenter["KeyA"]) {
        spelare.x -= spelare.hastighet;
      }

      if (tangenter["KeyD"]) {
        spelare.x += spelare.hastighet;
      }

      spelare.yHastighet += gravitation;
      spelare.y += spelare.yHastighet;

      if (spelare.y + spelare.hojd >= markY) {
        spelare.y = markY - spelare.hojd;
        spelare.yHastighet = 0;
        spelare.paMarken = true;
      }

      if (spelare.x < 0) {
        spelare.x = 0;
      }

      if (spelare.x + spelare.bredd > canvas.width) {
        spelare.x = canvas.width - spelare.bredd;
      }

      kollaSpikar();
      kollaPortal();
    }

    function kolliderar(a, b) {
      return (
        a.x < b.x + b.bredd &&
        a.x + a.bredd > b.x &&
        a.y < b.y + b.hojd &&
        a.y + a.hojd > b.y
      );
    }

    function kollaSpikar() {
      let spikar = nivaer[aktuellNiva].spikar;

      for (let spik of spikar) {
        if (kolliderar(spelare, spik)) {
          dog();
        }
      }
    }

    function kollaPortal() {
      let portal = nivaer[aktuellNiva].portal;

      if (kolliderar(spelare, portal)) {
        nastaNiva();
      }
    }

    function dog() {
      document.getElementById("meddelande").textContent = "Du dog på spikarna! Försök igen.";

      spelare.x = 50;
      spelare.y = 300;
      spelare.yHastighet = 0;
      spelare.paMarken = false;
    }

    function nastaNiva() {
      if (aktuellNiva < nivaer.length - 1) {
        laddaNiva(aktuellNiva + 1);
      } else {
        document.getElementById("meddelande").textContent = "Du klarade alla 20 nivåer! GG!";

        spelare.x = 50;
        spelare.y = 300;
        spelare.yHastighet = 0;
      }
    }

    function ritaMark() {
      ctx.fillStyle = "white";
      ctx.fillRect(0, markY, canvas.width, 5);
    }

    function ritaSpikar() {
      ctx.fillStyle = "red";

      let spikar = nivaer[aktuellNiva].spikar;

      for (let spik of spikar) {
        ctx.beginPath();
        ctx.moveTo(spik.x, spik.y + spik.hojd);
        ctx.lineTo(spik.x + spik.bredd / 2, spik.y);
        ctx.lineTo(spik.x + spik.bredd, spik.y + spik.hojd);
        ctx.closePath();
        ctx.fill();
      }
    }

    function ritaPortal() {
      let portal = nivaer[aktuellNiva].portal;

      ctx.fillStyle = "purple";
      ctx.fillRect(portal.x, portal.y, portal.bredd, portal.hojd);

      ctx.fillStyle = "cyan";
      ctx.fillRect(portal.x + 8, portal.y + 8, portal.bredd - 16, portal.hojd - 16);
    }

    function ritaSpelare() {
      ctx.fillStyle = "lime";
      ctx.fillRect(spelare.x, spelare.y, spelare.bredd, spelare.hojd);
    }

    function rita() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ritaMark();
      ritaSpikar();
      ritaPortal();
      ritaSpelare();
    }

    function spelLoop() {
      uppdatera();
      rita();
      requestAnimationFrame(spelLoop);
    }

    laddaNiva(0);
    spelLoop();
  </script>
